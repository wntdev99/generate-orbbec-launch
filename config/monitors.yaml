# Parameters for the generate_orbbec_launch monitor nodes.
# Loaded by launch/monitors.launch.py and launch/wifi_wan_monitor.launch.py.
# Override at runtime with:  ros2 launch ... config_file:=/path/to/your.yaml

usb_camera_monitor:
  ros__parameters:
    poll_period_sec: 2.0            # sysfs scan interval (s)
    vendor_ids: ['2bc5']            # Orbbec USB vendor id(s)
    # expected_serials: ['CP3S34D00051']  # uncomment to raise ERROR when an expected camera is missing
    frame_id: ''

kernel_log_monitor:
  ros__parameters:
    keywords: ['usb', 'uvcvideo', 'xhci', 'orbbec', '2bc5']
    max_priority: 7                 # publish entries with priority <= this (0=emerg .. 7=debug)
    include_backlog: false          # also emit recent lines on startup
    backlog_lines: 50               # how many recent lines when include_backlog
    diag_period_sec: 5.0            # /diagnostics summary interval (s)
    frame_id: ''

wifi_wan_monitor:
  ros__parameters:
    router_host: '192.168.34.1'
    router_user: 'root'
    wan_iface: 'sta1'               # router WiFi WAN (uplink) interface, per iwinfo
    poll_period_sec: 1.0           # how often to SSH the router (s) -- keep generous
    ssh_timeout_sec: 8.0
    weak_warn_dbm: -70              # WARN at/below this signal
    weak_error_dbm: -80             # ERROR at/below this signal
    frame_id: ''

# Two link_latency_monitor instances (launch/link_latency.launch.py):
#   internet -> end-to-end (router WiFi WAN + internet),  gateway -> local hop only.
# Topics are separated by node name, e.g. /link_latency_internet/latency.
link_latency_internet:
  ros__parameters:
    target: '8.8.8.8'               # end-to-end target
    timeout_sec: 1.0                # per-ping deadline = outage threshold
    period_sec: 1.0                 # loop / publish period (1 Hz)
    frame_id: ''

link_latency_gateway:
  ros__parameters:
    target: '192.168.34.1'          # the router (first hop, local segment)
    timeout_sec: 1.0
    period_sec: 1.0
    frame_id: ''

net_throughput_monitor:
  ros__parameters:
    interfaces: ['auto']            # 'auto' = egress iface via route; or explicit ['eno1', ...]
    route_target: '8.8.8.8'         # target used to resolve the egress iface when 'auto'
    period_sec: 1.0
    frame_id: ''

router_throughput_monitor:
  ros__parameters:
    router_host: '192.168.34.1'
    router_user: 'root'
    interfaces: ['sta1', 'br-lan']  # WAN (WiFi uplink), LAN bridge (all clients)
    period_sec: 2.0                 # SSH each period -- keep modest
    ssh_timeout_sec: 8.0
    frame_id: ''

# Service-controlled load generator. Trigger jobs at runtime, e.g.:
#   ros2 service call /load_generator/start generate_orbbec_launch/srv/StartLoad \
#     "{mode: 'udp', target: 'gateway', rate_mbps: 500, duration_sec: 30}"
#   ros2 service call /load_generator/stop std_srvs/srv/Trigger {}
load_generator:
  ros__parameters:
    internal_peer: ''               # LAN peer IP running load_sink (scope 'internal'); set me
    internet_target: '8.8.8.8'      # scope 'internet' destination (WAN uplink)
    default_port: 5201              # iperf3 default; tcp/udp use it too
    default_duration_sec: 30.0      # used when StartLoad.duration_sec == 0
    default_parallel: 4             # streams/sockets when StartLoad.parallel == 0
    default_publish_hz: 100.0       # ros_pub rate when not derived from rate_mbps
    ros_payload_bytes: 65000        # ros_pub message size (DDS/Zenoh middleware load)
    udp_payload_bytes: 1400         # udp datagram size (<= typical MTU)
    tcp_buffer_bytes: 65536         # tcp send() chunk
    max_duration_sec: 300.0         # SAFETY: hard cap on job duration (0 = no cap)
    max_rate_mbps: 1000.0           # SAFETY: hard cap on rate (0 = no cap)
    ros_qos_depth: 10
    ros_reliable: true              # RELIABLE stresses reliable QoS; false = BEST_EFFORT
    iperf3_path: 'iperf3'
    stats_period_sec: 1.0
    frame_id: ''

# Receiver for load_generator (run on the peer machine, or same host for loopback).
load_sink:
  ros__parameters:
    tcp_port: 5201
    udp_port: 5201
    enable_tcp: true
    enable_udp: true
    enable_ros: true
    bind_host: '0.0.0.0'
    recv_bufsize: 65536
    load_topic: '/load_generator/load_topic'  # the generator's ros_pub stream
    ros_reliable: true
    stats_period_sec: 1.0
    frame_id: ''
